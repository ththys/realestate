name: Naver Real Estate Daily Crawler & Pages

on:
  schedule:
    # 매일 한국 시간 기준 오전 9시 (UTC 00:00)에 자동으로 크롤링이 작동합니다.
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium

      - name: 크롤러 실행 (데이터 수집 및 배포 준비)
        run: python crawler.py

      - name: Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
